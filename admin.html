<!doctype html>
<html lang="mk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP Админ Листа</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Montserrat", sans-serif;
      background: linear-gradient(180deg, #fdf8f0, #f5ebe0);
    }

    .font-elegant { font-family: "Cormorant Garamond", serif; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 2rem;
    }

    th, td {
      border: 2px solid #e8c9a8;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background-color: #d4a574;
      color: white;
      font-size: 18px;
    }

    td { background-color: #ffffffcc; font-size: 15px; }

    .calc-box {
      background-color: #ffffffcc;
      border: 2px solid #e8c9a8;
      border-radius: 8px;
      padding: 16px;
      width: 100%;
      max-width: 700px;
      margin-top: 20px;
    }

    ul { margin:0; padding-left: 18px; }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center p-6">

<h1 class="font-elegant text-5xl text-center mb-6 text-[#5a4a3a]">
  RSVP Админ Листа
</h1>

<!-- TABLE -->
<div class="w-full max-w-6xl overflow-x-auto">
  <table>
    <thead>
      <tr>
        <th>Главен гостин</th>
        <th>Присуство</th>
        <th>Број на гости</th>
        <th>Гости + мени</th>
        <th>Порака</th>
      </tr>
    </thead>
    <tbody id="rsvpList"></tbody>
  </table>
</div>

<!-- STATISTICS -->
<div class="calc-box">
  <h2 class="font-elegant text-3xl text-[#5a4a3a] mb-3">Статистика</h2>
  <p id="totalGuests">Вкупно гости: 0</p>
  <p id="menuStandard">Стандардно мени: 0</p>
  <p id="menuVegan">Веганско мени: 0</p>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyDPqnM0CWvuY0IfdmVXO3jgrfZNUG1f9Q8",
    authDomain: "weddinginvitation-8415b.firebaseapp.com",
    projectId: "weddinginvitation-8415b",
    storageBucket: "weddinginvitation-8415b.firebasestorage.app",
    messagingSenderId: "754203729573",
    appId: "1:754203729573:web:b8858cb5beaf1d64a6b74c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const rsvpList = document.getElementById("rsvpList");

  // Stats elements
  const totalGuestsEl = document.getElementById("totalGuests");
  const menuStandardEl = document.getElementById("menuStandard");
  const menuVeganEl = document.getElementById("menuVegan");

  const q = query(collection(db, "rsvp"), orderBy("createdAt", "desc"));

  onSnapshot(q, (snapshot) => {
    rsvpList.innerHTML = "";

    // Reset stats
    let totalGuests = 0;
    let menuStandard = 0;
    let menuVegetarian = 0;
    let menuVegan = 0;

    snapshot.forEach((doc) => {
      const data = doc.data();

      // Bulletproof guests array
      let guestsArray = [];
      if (Array.isArray(data.guests)) {
        guestsArray = data.guests;
      } else if (typeof data.guests === "number") {
        // стар формат
        guestsArray = new Array(data.guests).fill({ menu: data.menu || "standard" });
      } else {
        guestsArray = [];
      }

      const guestCount = guestsArray.length;

      // Гости list HTML
      let guestHtml = "-";
      if (guestCount > 0) {
        guestHtml = "<ul>";
        guestsArray.forEach(g => {
          guestHtml += `<li>${g.name || "-"} (${g.menu || "standard"})</li>`;

          // Count menus
          const menuType = (g.menu || "").toLowerCase();
          if (menuType === "standard") menuStandard++;
          else if (menuType === "vegan") menuVegan++;
        });
        guestHtml += "</ul>";
        totalGuests += guestCount;
      }

      // Table row
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${data.name}</td>
        <td>${guestCount > 0 ? "Доаѓа" : "Не доаѓа"}</td>
        <td>${guestCount}</td>
        <td>${guestHtml}</td>
        <td>${data.message || ""}</td>
      `;

      rsvpList.appendChild(row);
    });

    // Update statistics
    totalGuestsEl.textContent = `Вкупно гости: ${totalGuests}`;
    menuStandardEl.textContent = `Стандардно мени: ${menuStandard}`;
    menuVeganEl.textContent = `Веганско мени: ${menuVegan}`;
  });
</script>

</body>
</html>
